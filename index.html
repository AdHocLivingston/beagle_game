<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beagles' Bustin Ice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: pointer; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
// BEAGLES' BUSTIN ICE — Complete Game v2
// ============================================================

// --- FONT ---
var FONT_LOADED=false,FONT_NAME='monospace';
(function(){var l=document.createElement('link');l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap';document.head.appendChild(l);
if(document.fonts&&document.fonts.load){document.fonts.load('16px "Press Start 2P"').then(function(){FONT_LOADED=true;FONT_NAME='"Press Start 2P",monospace';}).catch(function(){});}
setTimeout(function(){if(!FONT_LOADED)FONT_NAME='"Press Start 2P","Courier New",monospace';},2000);})();
function gf(s,b){return(b?'bold ':'')+s+'px '+FONT_NAME;}

// --- CONSTANTS ---
var CW=1280,CH=720;
var GROUND_Y=600; // Y where feet touch the ground
var LEVEL_LEN=7000,BOSS_X=6400,GRAVITY=0.6;
var PLAYER_H=136; // player sprite height at scale 2

// --- COLORS ---
var C={brown:'#8B5E3C',dkBrown:'#5C3A1E',tan:'#D4A46A',white:'#F5EDE0',nose:'#1A0A00',eyeW:'#FFF',eyeP:'#1A0A00',
shirts:{rico:{base:'#FFF',pat:'#C22',acc:'#F66'},coco:{base:'#DC2',pat:'#26C',acc:'#6AF'},duke:{base:'#2A8',pat:'#284',acc:'#6C8'},patches:{base:'#93C',pat:'#F60',acc:'#FA4'}}};

// --- PIXEL DRAW ---
function px(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}
function drawFlower(c,x,y,c1,c2){px(c,x+2,y,2,2,c1);px(c,x,y+2,2,2,c1);px(c,x+4,y+2,2,2,c1);px(c,x+2,y+4,2,2,c1);px(c,x+2,y+2,2,2,c2);}
function drawPalm(c,x,y,c1,c2){px(c,x+3,y+4,2,8,'#8B6914');px(c,x,y,8,2,c1);px(c,x+1,y+2,6,2,c2);px(c,x-1,y+1,2,2,c1);px(c,x+7,y+1,2,2,c1);}
function drawShirtPat(c,sx,sy,sw,sh,ch,cols){
  if(ch==='rico'){drawFlower(c,sx+6,sy+6,cols.pat,cols.acc);drawFlower(c,sx+sw-12,sy+14,cols.pat,cols.acc);drawFlower(c,sx+10,sy+18,cols.pat,cols.acc);}
  else if(ch==='coco'){for(var i=0;i<3;i++){var wy=sy+6+i*8;for(var j=0;j<sw-4;j+=6)px(c,sx+j+2,wy+(j%12<6?0:2),4,2,cols.pat);}}
  else if(ch==='duke'){drawPalm(c,sx+6,sy+4,cols.pat,cols.acc);drawPalm(c,sx+sw-12,sy+12,cols.pat,cols.acc);}
  else if(ch==='patches'){drawFlower(c,sx+4,sy+4,cols.pat,cols.acc);drawFlower(c,sx+sw-10,sy+10,cols.pat,cols.acc);drawFlower(c,sx+8,sy+18,cols.pat,cols.acc);}
}

// ============================================================
// BEAGLE SPRITE (drawn from top-left, ~48x68 at scale 1)
// ============================================================
function drawBeagle(c,x,y,ch,frame,scale,facing,action){
  frame=frame||0;scale=scale||1;facing=facing||1;action=action||'idle';
  c.save();c.translate(x,y);c.scale(scale*facing,scale);
  var sc=C.shirts[ch]||C.shirts.rico;var isP=ch==='patches';
  var hM=ch==='duke'?-6:ch==='coco'?4:0;var wM=ch==='coco'?2:ch==='duke'?-2:0;
  var bob=Math.sin(time*4)*1.5;
  var lLO=0,rLO=0;if(action==='walk'){lLO=Math.sin(time*8)*4;rLO=Math.sin(time*8+Math.PI)*4;}
  var ly=48+hM+bob;
  px(c,12+wM,ly+lLO,8,14,C.brown);px(c,10+wM,ly+12+lLO,10,4,C.dkBrown);
  px(c,26,ly+rLO,8,14,C.brown);px(c,26,ly+12+rLO,10,4,C.dkBrown);
  var by=24+hM+bob,bw=28+wM;
  px(c,8,by,bw,26,sc.base);drawShirtPat(c,8,by,bw,26,ch,sc);
  var aE=0;if(action==='punch')aE=12;if(action==='throw')aE=8;
  px(c,2,by+2+bob,8,18,sc.base);px(c,2,by+18+bob,8,6,C.tan);
  px(c,bw+6+aE,by+2+bob-(action==='punch'||action==='throw'?4:0),8+aE,18,sc.base);
  px(c,bw+6+aE*2,by+18+bob-(action==='punch'||action==='throw'?4:0),8,6,C.tan);
  if(action==='throw'){
    if(ch==='rico'){px(c,bw+10+aE,by+bob-2,12,6,'#AA2222');px(c,bw+22+aE,by+bob-1,4,4,'#FF4422');}
    else if(ch==='coco'){px(c,bw+10+aE,by+bob-2,10,6,'#AA4400');px(c,bw+20+aE,by+bob-4,4,6,'#FF6622');px(c,bw+18+aE,by+bob-6,3,3,'#FFAA22');}
    else if(ch==='duke'){px(c,bw+10+aE,by+bob-4,10,10,'#6644AA');px(c,bw+12+aE,by+bob-2,6,6,'#8866CC');px(c,bw+14+aE,by+bob,2,2,'#FFF');}
    else if(ch==='patches'){px(c,bw+10+aE,by+bob-2,8,8,'#CCAA22');px(c,bw+12+aE,by+bob,4,4,'#FFEE44');px(c,bw+18+aE,by+bob-4,2,6,'#FFFF88');}
    else{px(c,bw+10+aE,by+bob-2,10,10,'#E8E8F0');px(c,bw+12+aE,by+bob,6,6,'#FFF');}
  }
  var hy=4+bob;
  px(c,10,hy,26,22,C.brown);px(c,14,hy+8,18,14,C.tan);px(c,18,hy+2,10,20,C.white);
  px(c,16,hy+8,5,5,C.eyeW);px(c,26,hy+8,5,5,C.eyeW);px(c,18,hy+9,3,3,C.eyeP);px(c,28,hy+9,3,3,C.eyeP);
  if(isP){px(c,25,hy+7,7,7,C.dkBrown);px(c,26,hy+8,5,5,C.eyeW);px(c,28,hy+9,3,3,C.eyeP);}
  px(c,20,hy+16,6,4,C.nose);px(c,20,hy+20,6,1,C.dkBrown);
  px(c,6,hy+2,6,16,C.dkBrown);px(c,7,hy+4,4,12,C.brown);px(c,34,hy+2,6,16,C.dkBrown);px(c,35,hy+4,4,12,C.brown);
  var tx=Math.sin(time*6)*4;px(c,tx,by-2,6,4,C.white);px(c,tx-2,by-6,4,6,C.white);
  c.restore();
}
// --- INSTRUMENT SPRITES ---
function drawGuitar(c,x,y,scale,color){
  c.save();c.translate(x,y);c.scale(scale,scale);
  var col=color||'#8B4513';var dk=color?darkenCol(color,40):'#5C2E0A';
  // Neck
  px(c,8,0,4,22,dk);px(c,9,0,2,22,col);
  // Tuning pegs
  px(c,6,0,2,2,'#888');px(c,12,0,2,2,'#888');px(c,6,4,2,2,'#888');px(c,12,4,2,2,'#888');
  // Body
  px(c,2,22,16,20,col);px(c,0,26,20,12,col);px(c,2,38,16,6,col);
  // Sound hole
  px(c,7,28,6,6,'#1A0A00');px(c,8,29,4,4,'#2A1A10');
  // Bridge
  px(c,8,36,4,3,dk);
  // Strings
  for(var i=0;i<4;i++)px(c,8+i,8,1,30,'rgba(255,255,255,0.5)');
  c.restore();
}
function darkenCol(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);
  return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function drawDrumKit(c,x,y,scale){
  c.save();c.translate(x,y);c.scale(scale,scale);
  // Bass drum (center)
  px(c,18,20,24,22,'#AA2222');px(c,20,22,20,18,'#CC3333');px(c,26,26,8,10,'#FFFFFF');
  // Bass drum rim
  px(c,18,20,24,2,'#DDD');px(c,18,40,24,2,'#DDD');
  // Snare (left)
  px(c,4,18,14,10,'#C8C8C8');px(c,4,18,14,2,'#EEE');px(c,4,26,14,2,'#EEE');
  // Floor tom (right)
  px(c,42,18,14,12,'#882222');px(c,42,18,14,2,'#DDD');px(c,42,28,14,2,'#DDD');
  // Hi-hat (far left)
  px(c,0,8,12,2,'#DAA520');px(c,0,11,12,2,'#DAA520');px(c,5,13,2,18,'#888');
  // Crash cymbal (right)
  px(c,44,4,14,2,'#DAA520');px(c,50,6,2,16,'#888');
  // Tom 1 (above bass, left)
  px(c,16,8,12,10,'#882222');px(c,16,8,12,2,'#DDD');
  // Tom 2 (above bass, right)
  px(c,32,8,12,10,'#882222');px(c,32,8,12,2,'#DDD');
  // Legs
  px(c,10,28,2,16,'#888');px(c,48,30,2,14,'#888');
  px(c,22,42,2,6,'#888');px(c,36,42,2,6,'#888');
  c.restore();
}
function drawDrumSticks(c,x,y,scale,frame){
  c.save();c.translate(x,y);c.scale(scale,scale);
  var beat=Math.sin(frame*0.15)*0.3;
  // Left stick (hits snare area)
  c.save();c.translate(14,12);c.rotate(-0.4+beat);
  px(c,0,0,2,18,'#DEB887');px(c,-1,17,3,3,'#F5DEB3');
  c.restore();
  // Right stick (hits hi-hat/tom)
  c.save();c.translate(40,10);c.rotate(0.4-beat);
  px(c,0,0,2,18,'#DEB887');px(c,-1,17,3,3,'#F5DEB3');
  c.restore();
  c.restore();
}
function drawBeaglePortrait(c,x,y,ch,sz){
  sz=sz||64;var s=sz/64;c.save();c.translate(x,y);c.scale(s,s);
  var sc=C.shirts[ch]||C.shirts.rico;var isP=ch==='patches';
  c.fillStyle='#1A3355';c.beginPath();c.arc(32,32,30,0,Math.PI*2);c.fill();
  px(c,14,48,36,16,sc.base);px(c,14,10,36,30,C.brown);px(c,18,20,28,20,C.tan);px(c,22,12,18,28,C.white);
  px(c,20,22,8,8,C.eyeW);px(c,36,22,8,8,C.eyeW);px(c,23,24,4,4,C.eyeP);px(c,39,24,4,4,C.eyeP);
  if(isP){px(c,34,20,12,12,C.dkBrown);px(c,36,22,8,8,C.eyeW);px(c,39,24,4,4,C.eyeP);}
  px(c,26,34,10,6,C.nose);px(c,6,12,10,24,C.dkBrown);px(c,8,14,6,20,C.brown);
  px(c,48,12,10,24,C.dkBrown);px(c,50,14,6,20,C.brown);c.restore();
}

// ============================================================
// ENEMY SPRITES — Drawn from (0,0) at top-left, sized accordingly
// Each returns nothing, just draws. spriteH is the canonical height.
// ============================================================
var MONSTER_H=110, NINJA_H=100, SNOWMAN_H=105, BOSS_H=200;

function drawIceMonster(c,x,y,frame,mask,flash,melt){
  // ~80w x 110h big chunky ice creature
  melt=melt||0;
  c.save();c.translate(x,y);
  if(melt>0){var clipTop=110*melt*0.6;c.save();c.beginPath();c.rect(-20,clipTop,120,110-clipTop+10);c.clip();
    // Drip edge
    for(var di=0;di<5;di++){var dx2=10+di*16+Math.sin(di*3)*4;c.fillStyle='rgba(120,190,230,'+(0.6*melt)+')';c.fillRect(dx2,clipTop,4,3+Math.sin(di*7)*2);}
  }
  // Wet tint overlay
  var f=flash;
  // Legs (thick ice pillars)
  px(c,12,80,18,24,f?'#FFF':'#3A9AB8');px(c,14,82,14,20,f?'#FFF':'#4AAAC8');
  px(c,50,80,18,24,f?'#FFF':'#3A9AB8');px(c,52,82,14,20,f?'#FFF':'#4AAAC8');
  // Feet
  px(c,8,100,24,10,f?'#FFF':'#2A8AA8');px(c,46,100,24,10,f?'#FFF':'#2A8AA8');
  // Body (massive ice chunk)
  px(c,10,30,60,54,f?'#FFF':'#5ABCD8');px(c,14,34,52,46,f?'#FFF':'#6EC8E8');
  px(c,18,38,44,38,f?'#FFF':'#7ED8F0');
  // Crystal shoulder spikes
  px(c,0,28,14,8,f?'#FFF':'#A0E8FF');px(c,2,22,10,10,f?'#FFF':'#B0F0FF');px(c,-2,18,8,8,f?'#FFF':'#C0F8FF');
  px(c,66,28,14,8,f?'#FFF':'#A0E8FF');px(c,68,22,10,10,f?'#FFF':'#B0F0FF');px(c,74,18,8,8,f?'#FFF':'#C0F8FF');
  // Head
  px(c,18,10,44,28,f?'#FFF':'#6EC8E8');px(c,22,14,36,20,f?'#FFF':'#7ED8F0');
  // Crown crystals
  px(c,24,0,8,14,f?'#FFF':'#A0E8FF');px(c,36,-4,8,18,f?'#FFF':'#B0F0FF');px(c,48,2,8,12,f?'#FFF':'#A0E8FF');
  // Eyes (menacing red glow)
  px(c,26,22,10,8,f?'#AAA':'#FF1111');px(c,28,24,6,4,'#FF4444');px(c,30,25,2,2,'#FFAA00');
  px(c,44,22,10,8,f?'#AAA':'#FF1111');px(c,46,24,6,4,'#FF4444');px(c,48,25,2,2,'#FFAA00');
  // Mask
  if(mask===0){// Surgical
    px(c,22,32,36,12,f?'#DDD':'#66AACC');px(c,24,34,32,8,f?'#EEE':'#88CCDD');
    px(c,26,36,4,2,'#5599BB');px(c,50,36,4,2,'#5599BB');}
  else if(mask===1){// KN95
    px(c,20,30,40,16,f?'#DDD':'#EEEEDD');px(c,24,34,32,8,f?'#EEE':'#DDDDCC');
    px(c,36,38,8,4,'#CCCCBB');}
  else{// Winter scarf
    px(c,18,30,44,18,f?'#DDD':'#8866AA');px(c,20,32,40,14,f?'#EEE':'#9977BB');
    px(c,22,34,8,4,'#7755AA');px(c,50,34,8,4,'#7755AA');}
  // Body crystal texture
  if(!f){px(c,20,44,6,8,'#8EE0F8');px(c,40,50,8,6,'#8EE0F8');px(c,30,60,10,4,'#8EE0F8');}
  // Arms (ice club arms)
  px(c,0,38,14,30,f?'#FFF':'#4AAAC8');px(c,2,40,10,26,f?'#FFF':'#5ABCD8');
  px(c,66,38,14,30,f?'#FFF':'#4AAAC8');px(c,68,40,10,26,f?'#FFF':'#5ABCD8');
  // Fist ice chunks
  px(c,-2,64,12,10,f?'#FFF':'#A0E8FF');px(c,70,64,12,10,f?'#FFF':'#A0E8FF');
  if(melt>0){c.restore();// end clip
    c.globalAlpha=melt*0.3;c.fillStyle='#88BBDD';c.fillRect(-5,0,90,110);c.globalAlpha=1;}
  c.restore();
}

function drawIceNinja(c,x,y,frame,mask,flash,melt){
  // ~60w x 100h sleek ninja
  melt=melt||0;
  c.save();c.translate(x,y);
  if(melt>0){var clipTop=100*melt*0.6;c.save();c.beginPath();c.rect(-10,clipTop,80,100-clipTop+10);c.clip();
    for(var di=0;di<4;di++){var dx2=8+di*14+Math.sin(di*5)*3;c.fillStyle='rgba(120,190,230,'+(0.6*melt)+')';c.fillRect(dx2,clipTop,3,3+Math.sin(di*7)*2);}
  }
  var f=flash;
  var col=f?'#FFF':'#2A3A5A',col2=f?'#FFF':'#1A2A4A',acc=f?'#DDD':'#4488CC';
  // Legs
  px(c,16,68,12,24,col2);px(c,32,68,12,24,col2);
  // Ninja shoes (tabi boots)
  px(c,12,88,18,12,f?'#EEE':'#111');px(c,30,88,18,12,f?'#EEE':'#111');
  px(c,14,90,6,4,acc);px(c,40,90,6,4,acc);
  // Body
  px(c,12,28,36,42,col);px(c,16,32,28,34,col2);
  // Ice trim on suit
  px(c,12,28,36,3,acc);px(c,12,67,36,3,acc);
  // Belt
  px(c,12,56,36,6,f?'#DDD':'#111');px(c,22,57,4,4,f?'#CCC':'#FFD700');// belt buckle
  // Chest armor plate
  px(c,18,34,24,14,f?'#EEE':'#334466');px(c,20,36,20,10,f?'#DDD':'#3A4A6A');
  // Head (wrapped)
  px(c,14,4,32,26,col);px(c,18,8,24,18,col2);
  // Head band
  px(c,14,10,32,4,acc);
  // Eyes (glowing ice blue)
  px(c,20,14,8,6,f?'#AAA':'#88DDFF');px(c,22,16,4,2,'#AAEEFF');
  px(c,34,14,8,6,f?'#AAA':'#88DDFF');px(c,36,16,4,2,'#AAEEFF');
  // Mask variants
  if(mask===0){px(c,18,20,24,8,'#111');px(c,20,22,20,4,'#222');}
  else if(mask===1){px(c,16,18,28,12,'#445');px(c,20,14,8,6,'#88DDFF');px(c,34,14,8,6,'#88DDFF');}
  else{px(c,14,18,32,12,f?'#DDD':'#2A3A6A');px(c,16,20,28,8,f?'#EEE':'#3A4A7A');px(c,42,4,6,6,acc);}
  // Arms
  px(c,2,32,14,28,col);px(c,4,34,10,24,col2);
  px(c,44,32,14,28,col);px(c,46,34,10,24,col2);
  // Ice blade (right hand)
  px(c,52,42,4,24,f?'#DDD':'#88DDFF');px(c,50,38,8,6,f?'#EEE':'#AAEEFF');
  px(c,53,30,2,14,f?'#EEE':'#BBFFFF');
  // Hands
  px(c,4,58,10,6,f?'#EEE':'#1A2A4A');px(c,46,58,10,6,f?'#EEE':'#1A2A4A');
  if(melt>0){c.restore();
    c.globalAlpha=melt*0.3;c.fillStyle='#88BBDD';c.fillRect(-5,0,70,100);c.globalAlpha=1;}
  c.restore();
}

function drawSnowman(c,x,y,frame,mask,flash,melt){
  // ~70w x 105h
  melt=melt||0;
  c.save();c.translate(x,y);
  if(melt>0){var clipTop=105*melt*0.6;c.save();c.beginPath();c.rect(-20,clipTop,110,105-clipTop+30);c.clip();
    for(var di=0;di<5;di++){var dx2=5+di*14+Math.sin(di*4)*3;c.fillStyle='rgba(200,210,220,'+(0.6*melt)+')';c.fillRect(dx2,clipTop,4,3+Math.sin(di*7)*2);}
  }
  var f=flash;
  // Bottom ball
  c.fillStyle=f?'#FFF':'#E0E4EA';c.beginPath();c.arc(35,80,26,0,Math.PI*2);c.fill();
  if(!f){c.fillStyle='#D0D4DA';c.beginPath();c.arc(35,82,24,0,Math.PI*2);c.fill();
  c.fillStyle='#E0E4EA';c.beginPath();c.arc(35,78,22,0,Math.PI*2);c.fill();}
  // Middle ball
  c.fillStyle=f?'#FFF':'#E4E8EE';c.beginPath();c.arc(35,48,20,0,Math.PI*2);c.fill();
  if(!f){c.fillStyle='#D4D8DE';c.beginPath();c.arc(35,50,18,0,Math.PI*2);c.fill();
  c.fillStyle='#E4E8EE';c.beginPath();c.arc(35,46,17,0,Math.PI*2);c.fill();}
  // Buttons
  px(c,33,38,4,4,f?'#AAA':'#222');px(c,33,48,4,4,f?'#AAA':'#222');px(c,33,58,4,4,f?'#AAA':'#222');
  // Head
  c.fillStyle=f?'#FFF':'#E8ECF2';c.beginPath();c.arc(35,20,16,0,Math.PI*2);c.fill();
  if(!f){c.fillStyle='#D8DCE2';c.beginPath();c.arc(35,22,14,0,Math.PI*2);c.fill();
  c.fillStyle='#E8ECF2';c.beginPath();c.arc(35,18,13,0,Math.PI*2);c.fill();}
  // Top hat
  px(c,20,-2,30,6,f?'#AAA':'#222');px(c,24,-20,22,20,f?'#AAA':'#222');
  px(c,24,-18,22,2,f?'#BBB':'#444');// hat band
  px(c,26,-16,18,14,f?'#999':'#2A2A2A');// hat highlight
  // Eyes (menacing red)
  px(c,26,14,8,8,f?'#AAA':'#FF1111');px(c,28,16,4,4,'#FF4444');px(c,29,17,2,2,'#FFAA00');
  px(c,40,14,8,8,f?'#AAA':'#FF1111');px(c,42,16,4,4,'#FF4444');px(c,43,17,2,2,'#FFAA00');
  // Carrot nose

function updatePlayer(){
  var p=player;if(!p||p.state==='dead')return;
  var dtN=dt*60; // normalize physics to 60fps
  if(p.invulnTimer>0)p.invulnTimer-=dt;
  if(p.hitStun>0){p.hitStun-=dt;return;}
  if(p.stateTimer>0){p.stateTimer-=dt;if(p.stateTimer<=0)p.state='idle';}
  var canMove=p.state==='idle'||p.state==='walk'||p.state==='jump';
  var canAtk=(p.state==='idle'||p.state==='walk')&&p.onGround;
  var moveDir=0;
  if(canMove){if(keys['ArrowLeft']||keys['KeyA'])moveDir=-1;if(keys['ArrowRight']||keys['KeyD'])moveDir=1;}
  p.onIce=isOnIce(p.x+p.w/2)&&p.onGround;
  var fric=p.onIce?0.96:0.88,accel=p.onIce?0.3:0.7;
  if(moveDir!==0&&canMove){p.vx+=moveDir*accel*p.char.speed*0.18*dtN;p.facing=moveDir;if(p.state!=='jump')p.state='walk';}
  else if(p.state==='walk'&&p.onGround)p.state='idle';
  p.vx*=Math.pow(fric,dtN);var maxVel=p.char.speed*1.8;if(p.vx>maxVel)p.vx=maxVel;if(p.vx<-maxVel)p.vx=-maxVel;if(Math.abs(p.vx)<0.05)p.vx=0;
  if(p.onIce&&Math.abs(p.vx)>2&&iceSlideCd<=0){AM.sfx('slide');iceSlideCd=0.5;}
  if(iceSlideCd>0)iceSlideCd-=dt;
  // Coyote time: allow jumping briefly after leaving ground
  if(p.onGround)p.coyoteTime=0.08;else p.coyoteTime=Math.max(0,p.coyoteTime-dt);
  // Jump buffer: remember jump press briefly before landing
  var wantJump=keys['Space']||keys['KeyW']||keys['ArrowUp'];
  if(wantJump)p.jumpBuffer=0.12;else p.jumpBuffer=Math.max(0,(p.jumpBuffer||0)-dt);
  // Jump
  if(p.jumpBuffer>0&&p.coyoteTime>0&&canMove){p.vy=-p.char.jump;p.onGround=false;p.coyoteTime=0;p.jumpBuffer=0;p.state='jump';AM.sfx('jump');}
  // Punch (Left Shift)
  if(keys['ShiftLeft']&&canAtk){
    if(keys['ControlLeft']&&p.energy>=30){p.state='special';p.stateTimer=0.4;p.energy-=30;doAttack(p.char.punch*2.5,90,'special');shake(6,0.15);keys['ShiftLeft']=false;keys['ControlLeft']=false;}
    else{p.state='punch';p.stateTimer=0.2;doAttack(p.char.punch,55,'punch');keys['ShiftLeft']=false;}}
  // Fire weapon (Left Control)
  if(throwCd>0)throwCd-=dt;
  if(laserTimer>0)laserTimer-=dt;
  var wType=p.char.weapon;
  if(wType==='flame'&&keys['ControlLeft']&&(canAtk||p.state==='throw')&&throwCd<=0){
    // Flamethrower: continuous fire while held
    p.state='throw';p.stateTimer=0.15;throwCd=0.05;
    var fx=p.facing>0?p.x+p.w:p.x-8;
    var fy=p.y-PLAYER_H*0.55;
    projectiles.push({x:fx,y:fy,vx:p.facing*6+(Math.random()-0.5)*1,vy:(Math.random()-0.5)*2,life:0.3,damage:p.char.weaponDmg,type:'flame',friendly:true,size:3+Math.random()*4});
    if(Math.random()<0.3)AM.sfx('flame');
  }
  else if(keys['ControlLeft']&&canAtk&&p.state!=='punch'&&throwCd<=0){
    if(wType==='laser'){
      // Laser: instant hitscan
      p.state='throw';p.stateTimer=0.25;throwCd=0.5;
      laserStartX=p.facing>0?p.x+p.w+8:p.x-8;
      laserStartY=p.y-PLAYER_H*0.55;
      var lx=laserStartX,ly=laserStartY,maxRange=400,hitDist=maxRange;
      laserHitX=lx+p.facing*maxRange;laserHitY=ly;
      var hitEnemy=null;
      enemies.forEach(function(e){if(e.dead||e.melting)return;
        var ey=e.y-e.sh;
        if(ly>ey&&ly<e.y&&((p.facing>0&&e.x>lx&&e.x<lx+maxRange)||(p.facing<0&&e.x+e.w<lx&&e.x+e.w>lx-maxRange))){
          var d=p.facing>0?e.x-lx:lx-(e.x+e.w);
          if(d<hitDist){hitDist=d;hitEnemy=e;laserHitX=p.facing>0?e.x+e.w/2:e.x+e.w/2;}
        }});
      if(hitEnemy){
        hitEnemy.hp-=p.char.weaponDmg;hitEnemy.hitTimer=0.15;hitEnemy.vx=p.facing*3;
        spawnP(laserHitX,ly,8,'#FF8844',4,0.3);spawnDmg(hitEnemy.x+hitEnemy.w/2,hitEnemy.y-hitEnemy.sh,p.char.weaponDmg);
        combo++;comboTimer=1.5;p.energy=Math.min(p.maxEnergy,p.energy+3);
        if(hitEnemy.hp<=0)killEnemy(hitEnemy);
      }
      // Also check boss
      if(!hitEnemy&&boss&&!boss.dead&&!boss.immune){
        var bx2=boss.x,by2=boss.y-BOSS_H;
        if(ly>by2&&ly<boss.y&&((p.facing>0&&bx2>lx&&bx2<lx+maxRange)||(p.facing<0&&bx2+boss.w<lx&&bx2+boss.w>lx-maxRange))){
          boss.hp-=p.char.weaponDmg;boss.hitTimer=0.15;laserHitX=bx2+boss.w/2;
          spawnP(laserHitX-camX,ly,10,'#FF8844',4,0.3);spawnDmg(bx2+boss.w/2-camX,by2,p.char.weaponDmg);
          AM.sfx('bhit');combo++;comboTimer=1.5;p.energy=Math.min(p.maxEnergy,p.energy+2);
          if(boss.hp<=0){boss.dead=true;boss.deathTimer=3;AM.sfx('bdeath');shake(10,0.5);spawnP(bx2+boss.w/2-camX,boss.y-BOSS_H/2,40,'#FFDD44',8,1);score+=1000;}
        }
      }
      laserTimer=0.25;
      AM.sfx('laser');shake(3,0.08);
    }
    else if(wType==='plasma'){
      // Plasma orb: slow, explosive
      p.state='throw';p.stateTimer=0.3;throwCd=0.8;
      var px3=p.facing>0?p.x+p.w+8:p.x-16;
      projectiles.push({x:px3,y:p.y-PLAYER_H*0.55,vx:p.facing*5,vy:0,life:3,damage:p.char.weaponDmg,type:'plasma',friendly:true});
      AM.sfx('plasma');
    }
    else if(wType==='tesla'){
      // Tesla bolt
      p.state='throw';p.stateTimer=0.25;throwCd=0.6;
      var tx=p.facing>0?p.x+p.w+8:p.x-16;
      projectiles.push({x:tx,y:p.y-PLAYER_H*0.55,vx:p.facing*7,vy:0,life:1.5,damage:p.char.weaponDmg,type:'tesla',friendly:true});
      AM.sfx('tesla');
    }
    keys['ControlLeft']=false;
  }
  // Dodge
  if(canMove&&p.onGround){var dir=0;if(keys['ArrowLeft']||keys['KeyA'])dir=-1;if(keys['ArrowRight']||keys['KeyD'])dir=1;
    if(dir!==0&&dir===lastDirTap.dir&&(time-lastDirTap.time)<0.25&&p.state!=='dodge'){p.state='dodge';p.stateTimer=0.3;p.vx=dir*12;p.invulnTimer=0.3;lastDirTap.time=0;}}
  // Physics (dt-normalized)
  var prevY=p.y;
  p.vy+=GRAVITY*dtN;p.x+=p.vx*dtN;p.y+=p.vy*dtN;
  if(p.y>=GROUND_Y){p.y=GROUND_Y;p.vy=0;p.onGround=true;if(p.state==='jump')p.state='idle';}
  // Platform collision (one-way: only land when falling and was above)
  if(p.vy>0&&p.y<GROUND_Y){
    for(var pi=0;pi<platforms.length;pi++){var plat=platforms[pi];
      if(p.x+p.w>plat.x&&p.x<plat.x+plat.w&&prevY<=plat.y&&p.y>=plat.y){
        p.y=plat.y;p.vy=0;p.onGround=true;p.onPlatform=pi;if(p.state==='jump')p.state='idle';break;}}}
  // Fall off platform edge
  if(p.onGround&&p.onPlatform!==undefined&&p.y<GROUND_Y){var cp=platforms[p.onPlatform];
    if(p.x+p.w<=cp.x||p.x>=cp.x+cp.w){p.onGround=false;p.onPlatform=undefined;}}
  if(p.y>=GROUND_Y)p.onPlatform=undefined;
  // Stomp mechanic — landing on enemy heads
  if(p.vy>0&&!p.onGround){
    var feet=p.y,pLeft=p.x,pRight=p.x+p.w;
    enemies.forEach(function(e){if(e.dead)return;
      var eTop=e.y-e.sh,stompZone=e.sh*0.2;
      if(pRight>e.x&&pLeft<e.x+e.w&&feet>=eTop&&feet<=eTop+stompZone){
        var dmg=p.char.punch;
        e.hp-=dmg;e.hitTimer=0.15;e.vx=p.facing*4;
        spawnP(e.x+e.w/2,eTop,10,'#FF8844',4,0.3);spawnDmg(e.x+e.w/2,eTop,dmg);
        shake(3,0.1);combo++;comboTimer=1.5;p.energy=Math.min(p.maxEnergy,p.energy+5);
        p.vy=-p.char.jump*0.7;p.invulnTimer=Math.max(p.invulnTimer,0.2);
        AM.sfx('stomp');
        if(e.hp<=0)killEnemy(e);
      }});
  }
  if(p.x<0)p.x=0;if(boss&&p.x>BOSS_X+500)p.x=BOSS_X+500;else if(!boss&&p.x>LEVEL_LEN)p.x=LEVEL_LEN;
  p.animTimer+=dt;if(p.animTimer>0.12){p.animTimer=0;p.animFrame++;}
  var tc=p.x-CW*0.35;if(tc<0)tc=0;if(boss&&tc>BOSS_X-200)tc=BOSS_X-200;camX+=(tc-camX)*0.10;
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}
  if(!boss&&p.x>BOSS_X&&state==='GAMEPLAY'){state='BOSS_INTRO';bossIntroTimer=3;enemies=[];AM.stopM();}
  if(controlsHintTimer>0)controlsHintTimer-=dt;
  // Bark
  if(p.barkTimer!==undefined){p.barkTimer-=dt;if(p.barkTimer<=0){AM.sfx('bark');particles.push({x:p.x-camX+24,y:p.y-PLAYER_H-20,vx:0,vy:-1.5,life:0.8,maxLife:0.8,color:'#FFF',size:0,text:'WOOF!',isText:true});p.barkTimer=5+Math.random()*10;}}
}

function doAttack(damage,range,type){
  var p=player,hitX=p.facing>0?p.x+p.w:p.x-range,hitW=range,hitY=p.y-PLAYER_H,hitH=PLAYER_H;
  var hitAny=false;
  AM.sfx('punch');
  enemies.forEach(function(e){if(e.dead)return;
    var ey=e.y-e.sh;
    if(hitX<e.x+e.w&&hitX+hitW>e.x&&hitY<ey+e.sh&&hitY+hitH>ey){
      e.hp-=damage;e.hitTimer=0.15;e.vx=p.facing*6;hitAny=true;
      spawnP(e.x+e.w/2,e.y-e.sh/2,8,'#FF8844',4,0.3);spawnDmg(e.x+e.w/2,e.y-e.sh,damage);
      shake(type==='special'?4:2,0.08);if(type==='special'){spawnP(e.x+e.w/2,e.y-e.sh/2,15,'#FF4422',6,0.5);shake(6,0.12);}
      combo++;comboTimer=1.5;player.energy=Math.min(player.maxEnergy,player.energy+5);
      if(e.hp<=0)killEnemy(e);
    }});
  if(boss&&!boss.dead&&!boss.immune){
    var bx=boss.x,by=boss.y-BOSS_H;
    if(hitX<bx+boss.w&&hitX+hitW>bx&&hitY<by+BOSS_H&&hitY+hitH>by){
      boss.hp-=damage;boss.hitTimer=0.15;hitAny=true;
      spawnP(bx+boss.w/2-camX,boss.y-BOSS_H/2,12,'#FFDD44',5,0.3);spawnDmg(bx+boss.w/2-camX,boss.y-BOSS_H,damage);
      AM.sfx('bhit');shake(type==='special'?5:3,0.1);player.energy=Math.min(player.maxEnergy,player.energy+3);
      combo++;comboTimer=1.5;
      if(boss.hp<=0){boss.dead=true;boss.deathTimer=3;AM.sfx('bdeath');shake(10,0.5);spawnP(bx+boss.w/2-camX,boss.y-BOSS_H/2,40,'#FFDD44',8,1);score+=1000;}
    }}
  if(hitAny)freezeTimer=0.03;
}

function hurtPlayer(dmg){
  var p=player;if(p.invulnTimer>0||p.state==='dodge')return;
  p.hp-=dmg;p.hitStun=0.3;p.invulnTimer=1;p.state='hit';p.stateTimer=0.3;p.vx=-p.facing*4;
  shake(3,0.1);spawnP(p.x+p.w/2,p.y-PLAYER_H/2,6,'#FF4444',3,0.3);
  if(p.hp<=0){p.lives--;if(p.lives<=0){p.state='dead';state='GAME_OVER';gameOverTimer=3;}else{p.hp=p.maxHP;p.invulnTimer=2;p.energy=50;}}
}

function killEnemy(e){
  e.melting=true;e.meltProgress=0;
  score+=e.type==='monster'?200:e.type==='ninja'?150:100;
  AM.sfx('melt');
  spawnP(e.x+e.w/2,e.y-e.sh/2,15,'#FF8844',4,0.4);
  spawnP(e.x+e.w/2,e.y-e.sh/2,10,'#88CCEE',3,0.5);
}

// ENEMIES
// ============================================================
function spawnEnemy(type,x){
  var e={type:type,x:x,y:GROUND_Y,vx:0,vy:0,hp:0,maxHP:0,w:70,sh:MONSTER_H,
    state:'idle',stateTimer:0,attackTimer:1+Math.random()*2,animFrame:0,animTimer:0,
    hitTimer:0,dead:false,deathTimer:0,maskType:Math.floor(Math.random()*3),facing:-1,
    homeX:x,patrolTimer:Math.random()*Math.PI*2,
    meltLevel:0,melting:false,meltProgress:0,dripTimer:0};
  if(type==='monster'){e.hp=60;e.maxHP=60;e.w=80;e.sh=MONSTER_H;}
  else if(type==='ninja'){e.hp=30;e.maxHP=30;e.w=60;e.sh=NINJA_H;}
  else{e.hp=40;e.maxHP=40;e.w=70;e.sh=SNOWMAN_H;}
  enemies.push(e);
}

function updateEnemies(){
  var p=player;
  enemies.forEach(function(e){
    if(e.dead){e.deathTimer-=dt;if(e.deathTimer<=0)e.remove=true;return;}
    // Melting death animation
    if(e.melting){
      e.meltProgress+=dt*0.7;
      e.dripTimer-=dt;
      var meltLineY=e.y-e.sh*(1-e.meltProgress);
      if(e.dripTimer<=0){
        e.dripTimer=0.03;
        // Spawn 2-3 drip particles from the melt line
        for(var di=0;di<2+Math.floor(Math.random()*2);di++){
          var dx=e.x+Math.random()*e.w;
          spawnDrip(dx,meltLineY,'#88CCEE',0.5+Math.random()*0.4);
        }
        // Drips from random spots on remaining body below melt line
        if(Math.random()<0.6){
          var bodyY=meltLineY+Math.random()*(e.y-meltLineY);
          spawnDrip(e.x+Math.random()*e.w,bodyY,'#6ABBE8',0.3+Math.random()*0.3);
        }
      }
      // Steam puffs rising from puddle area
      if(e.meltProgress>0.2){
        if(Math.random()<0.4)spawnP(e.x+Math.random()*e.w,e.y-4,1,'rgba(200,220,240,0.5)',1.5,0.6);
      }
      // Bigger water splashes at feet as drips land
      if(e.meltProgress>0.1&&Math.random()<0.15){
        spawnP(e.x+Math.random()*e.w,e.y-2,2,'#88CCEE',0.8,0.25);
      }
      if(e.meltProgress>=1){e.dead=true;e.deathTimer=1.5;}
      return;
    }
    if(e.hitTimer>0){e.hitTimer-=dt;e.x+=e.vx*dt*10;e.vx*=0.9;return;}
    var dx=p.x-e.x,dist=Math.abs(dx);e.facing=dx>0?1:-1;
    var oI=isOnIce(e.x+e.w/2),fr=oI?0.95:0.8;
    e.attackTimer-=dt;e.animTimer+=dt;if(e.animTimer>0.15){e.animTimer=0;e.animFrame++;}
    e.patrolTimer+=dt;
    if(e.type==='monster'){
      // Slow waddle patrol around spawn point
      var patrolX=e.homeX+Math.sin(e.patrolTimer*0.8)*60;
      var toHome=patrolX-e.x;
      e.vx+=toHome*0.02;e.state=Math.abs(e.vx)>0.3?'walk':'idle';
      if(Math.abs(toHome)>2)e.facing=toHome>0?1:-1;else e.facing=dx>0?1:-1;
      if(dist<100&&e.attackTimer<=0){e.state='attack';e.stateTimer=0.5;e.attackTimer=2.5;e.vx=e.facing*4;
        setTimeout(function(){if(!e.dead&&!e.melting&&Math.abs(p.x-e.x)<100)hurtPlayer(20);},300);}
    }else if(e.type==='ninja'){
      // Quick side-to-side dart patrol
      var patrolX=e.homeX+Math.sin(e.patrolTimer*1.5)*50;
      var toHome=patrolX-e.x;
      e.vx+=toHome*0.03;e.state=Math.abs(e.vx)>0.3?'walk':'idle';
      if(Math.abs(toHome)>2)e.facing=toHome>0?1:-1;else e.facing=dx>0?1:-1;
      if(dist<80&&e.attackTimer<=0){e.state='attack';e.stateTimer=0.3;e.attackTimer=1.5;
        setTimeout(function(){if(!e.dead&&!e.melting&&Math.abs(p.x-e.x)<80)hurtPlayer(12);},150);
        setTimeout(function(){if(!e.dead&&!e.melting&&Math.abs(p.x-e.x)<80)hurtPlayer(10);},250);}
    }else{
      // Snowman stands in place, sways slightly, throws from range
      var patrolX=e.homeX+Math.sin(e.patrolTimer*0.5)*20;
      var toHome=patrolX-e.x;
      e.vx+=toHome*0.01;e.state=Math.abs(e.vx)>0.2?'walk':'idle';
      e.facing=dx>0?1:-1;
      if(dist<300&&e.attackTimer<=0){e.state='attack';e.stateTimer=0.3;e.attackTimer=2;
        projectiles.push({x:e.x+e.w/2,y:e.y-e.sh*0.6,vx:e.facing*5,vy:-4,life:3,damage:10,type:'snowball'});}
    }
    e.vx*=fr;e.x+=e.vx;if(e.y>GROUND_Y){e.y=GROUND_Y;e.vy=0;}
    // Live melt damage visualization
    e.meltLevel=1-(e.hp/e.maxHP);
    e.dripTimer-=dt;
    if(e.meltLevel>0.3&&e.dripTimer<=0){
      e.dripTimer=e.meltLevel>0.6?0.15:0.4;
      var dripY=e.y-e.sh*(1-e.meltLevel*0.4)+Math.random()*e.sh*0.3;
      spawnDrip(e.x+Math.random()*e.w,dripY,'#88CCEE',0.4+Math.random()*0.3);
      if(e.meltLevel>0.6){
        spawnDrip(e.x+Math.random()*e.w,dripY+Math.random()*20,'#6ABBE8',0.3);
        if(Math.random()<0.4)spawnP(e.x+Math.random()*e.w,e.y-4,1,'rgba(200,220,240,0.5)',1,0.5);
      }
    }
  });
  enemies=enemies.filter(function(e){return!e.remove;});
  // Projectiles
  projectiles.forEach(function(pr){pr.x+=pr.vx;pr.y+=pr.vy;
    if(pr.type==='flame')pr.vy+=0.02;else if(pr.type==='plasma'||pr.type==='tesla')pr.vy+=0.03;else pr.vy+=0.15;
    pr.life-=dt;
    if(!pr.friendly){
      if(p&&p.x+p.w>pr.x-10&&p.x<pr.x+10&&p.y-PLAYER_H<pr.y+10&&p.y>pr.y-10){hurtPlayer(pr.damage);pr.life=0;spawnP(pr.x,pr.y,6,'#FFF',3,0.3);}
    }else{
      // Player weapon projectile hits enemies
      var prHit=false;
      enemies.forEach(function(e){if(e.dead||e.melting||prHit)return;
        var ey=e.y-e.sh;var hitW=pr.type==='flame'?8:pr.type==='plasma'?14:10;
        if(pr.x>e.x-hitW&&pr.x<e.x+e.w+hitW&&pr.y>ey&&pr.y<e.y){
          e.hp-=pr.damage;e.hitTimer=0.15;e.vx=(pr.vx>0?1:-1)*(pr.type==='plasma'?6:4);pr.life=0;prHit=true;
          spawnP(pr.x,pr.y,8,'#FF8844',4,0.3);spawnDmg(e.x+e.w/2,ey,pr.damage);
          combo++;comboTimer=1.5;player.energy=Math.min(player.maxEnergy,player.energy+3);
          if(e.hp<=0)killEnemy(e);
          // Plasma splash damage
          if(pr.type==='plasma'){
            shake(4,0.1);spawnP(pr.x,pr.y,20,'#FF6622',6,0.4);spawnP(pr.x,pr.y,10,'#FFAA44',5,0.3);
            enemies.forEach(function(e2){if(e2===e||e2.dead||e2.melting)return;
              var d2=Math.abs(e2.x+e2.w/2-(e.x+e.w/2));
              if(d2<80){var sd=Math.floor(pr.damage/2);e2.hp-=sd;e2.hitTimer=0.15;
                spawnDmg(e2.x+e2.w/2,e2.y-e2.sh,sd);if(e2.hp<=0)killEnemy(e2);}
            });
          }
          // Tesla chain lightning
          if(pr.type==='tesla'){
            teslaChains=[];var chained=0;
            enemies.forEach(function(e2){if(e2===e||e2.dead||e2.melting||chained>=2)return;
              var d2=Math.abs(e2.x+e2.w/2-(e.x+e.w/2));
              if(d2<150){chained++;e2.hp-=pr.damage;e2.hitTimer=0.15;
                spawnDmg(e2.x+e2.w/2,e2.y-e2.sh,pr.damage);spawnP(e2.x+e2.w/2,e2.y-e2.sh/2,5,'#FFEE44',3,0.3);
                teslaChains.push({x1:e.x+e.w/2,y1:e.y-e.sh/2,x2:e2.x+e2.w/2,y2:e2.y-e2.sh/2,life:0.3});
                if(e2.hp<=0)killEnemy(e2);}
            });
          }
        }});
      // Player projectile hits boss
      if(!prHit&&boss&&!boss.dead&&!boss.immune){
        var bx2=boss.x,by2=boss.y-BOSS_H;
        if(pr.x>bx2&&pr.x<bx2+boss.w&&pr.y>by2&&pr.y<boss.y){
          boss.hp-=pr.damage;boss.hitTimer=0.15;pr.life=0;
          spawnP(pr.x,pr.y,10,'#FF8844',4,0.3);spawnDmg(bx2+boss.w/2,by2,pr.damage);
          AM.sfx('bhit');combo++;comboTimer=1.5;player.energy=Math.min(player.maxEnergy,player.energy+2);
          if(pr.type==='plasma'){shake(4,0.1);spawnP(pr.x,pr.y,20,'#FF6622',6,0.4);}
          if(boss.hp<=0){boss.dead=true;boss.deathTimer=3;AM.sfx('bdeath');shake(10,0.5);spawnP(bx2+boss.w/2,boss.y-BOSS_H/2,40,'#FFDD44',8,1);score+=1000;}
        }}
    }
    if(pr.y>GROUND_Y+40)pr.life=0;});
  projectiles=projectiles.filter(function(pr){return pr.life>0;});
  // Spawn waves
  if(state==='GAMEPLAY'&&p&&p.x>nextSpawnX){waveCount++;var inten=Math.min(waveCount/10,1);var cnt=1+Math.floor(inten*2);
    for(var i=0;i<cnt;i++){var types=['monster','ninja','snowman'];var tp=types[Math.floor(Math.random()*types.length)];
      if(inten>0.5&&Math.random()<0.4)tp='ninja';spawnEnemy(tp,p.x+CW/2+100+Math.random()*200);}
    nextSpawnX+=500-inten*100;}
}

// ============================================================
// BOSS
// ============================================================
function initBoss(){
  boss={x:BOSS_X+400,y:GROUND_Y,w:100,h:BOSS_H,hp:500,maxHP:500,
    phase:1,state:'idle',stateTimer:2,attackTimer:2,hitTimer:0,
    dead:false,deathTimer:0,immune:false,facing:-1,animFrame:0,summonedNinjas:false};
  AM.playM('boss');
}

function updateBoss(){
  if(!boss||boss.dead){if(boss&&boss.dead){boss.deathTimer-=dt;if(boss.deathTimer<=0){state='VICTORY';victoryTimer=0;AM.playM('victory');}}return;}
  boss.animFrame++;if(boss.hitTimer>0)boss.hitTimer-=dt;
  var hpP=boss.hp/boss.maxHP;
  if(hpP>0.8)boss.phase=1;else if(hpP>0.6)boss.phase=2;else if(hpP>0.4)boss.phase=3;else if(hpP>0.2)boss.phase=4;else boss.phase=5;
  var p=player,dx=p.x-boss.x;boss.facing=dx>0?1:-1;
  boss.stateTimer-=dt;boss.attackTimer-=dt;
  if(boss.phase===3&&!boss.summonedNinjas){boss.summonedNinjas=true;boss.immune=true;spawnEnemy('ninja',boss.x-120);spawnEnemy('ninja',boss.x+boss.w+60);}
  if(boss.immune&&boss.phase===3){if(enemies.filter(function(e){return!e.dead;}).length===0)boss.immune=false;}
  if(boss.phase!==3){boss.immune=false;boss.summonedNinjas=false;}
  if(boss.attackTimer<=0){boss.attackTimer=boss.phase>=5?1:2;
    if(boss.phase===1){projectiles.push({x:boss.x+boss.w/2,y:boss.y-BOSS_H*0.8,vx:boss.facing*6,vy:-6,life:3,damage:18,type:'grenade'});}
    else if(boss.phase===2){boss.state='charge';boss.stateTimer=0.8;boss.vx=boss.facing*12;}
    else if(boss.phase===4){projectiles.push({x:boss.x+boss.w/2,y:boss.y-BOSS_H*0.5,vx:boss.facing*3,vy:0,life:4,damage:15,type:'freeze'});}
    else if(boss.phase===5){var r=Math.random();if(r<0.3)projectiles.push({x:boss.x+boss.w/2,y:boss.y-BOSS_H*0.8,vx:boss.facing*7,vy:-5,life:3,damage:20,type:'grenade'});
      else if(r<0.6){boss.state='charge';boss.stateTimer=0.6;boss.vx=boss.facing*15;}
      else projectiles.push({x:boss.x+boss.w/2,y:boss.y-BOSS_H*0.5,vx:boss.facing*4,vy:0,life:3,damage:18,type:'freeze'});boss.attackTimer=0.8;}
  }
  if(boss.state==='charge'){boss.x+=(boss.vx||0);if(boss.stateTimer<=0){boss.state='idle';boss.vx=0;}
    if(Math.abs(player.x-boss.x)<70&&Math.abs(player.y-boss.y)<100)hurtPlayer(22);}
  else{if(Math.abs(dx)>160)boss.x+=boss.facing*(boss.phase>=5?2.5:1.5);}
  if(boss.x<BOSS_X-100)boss.x=BOSS_X-100;if(boss.x>BOSS_X+600)boss.x=BOSS_X+600;
}

function getCC(e){var r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*CW/r.width,y:(e.clientY-r.top)*CH/r.height};}
window.addEventListener('keydown',function(e){
  if(state==='TITLE'){startAud();state='CHARACTER_SELECT';AM.sfx('menu');return;}
  var prev=keys[e.code];keys[e.code]=true;
  if(!prev&&(e.code==='ArrowLeft'||e.code==='KeyA'))lastDirTap={dir:-1,time:time};
  if(!prev&&(e.code==='ArrowRight'||e.code==='KeyD'))lastDirTap={dir:1,time:time};
  e.preventDefault();
});
window.addEventListener('keyup',function(e){keys[e.code]=false;});
function startAud(){if(!audioStarted){AM.i();AM.r();AM.playM('title');audioStarted=true;}}
canvas=document.getElementById('gameCanvas');
canvas.addEventListener('click',function(e){var m=getCC(e);
  if(state==='TITLE'){startAud();state='CHARACTER_SELECT';AM.sfx('menu');return;}
  if(state==='CHARACTER_SELECT')handleCS(m.x,m.y);
  if(state==='VICTORY')handleVC(m.x,m.y);
  if(state==='GAME_OVER'&&gameOverTimer<=0){resetGame();state='GAMEPLAY';AM.playM('gameplay');}
});
function handleCS(mx,my){var bW=180,bH=240,gap=30,tW=CHARS.length*bW+(CHARS.length-1)*gap,sX=(CW-tW)/2,bY=140;
  for(var i=0;i<CHARS.length;i++){var bx=sX+i*(bW+gap);if(mx>=bx&&mx<=bx+bW&&my>=bY&&my<=bY+bH){if(selChar===i)startGP();else{selChar=i;AM.sfx('menu');}return;}}
  if(playBtnRect&&selChar>=0){var b=playBtnRect;if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h)startGP();}}
function startGP(){AM.sfx('menu');resetGame();state='GAMEPLAY';AM.playM('gameplay');}
function handleVC(mx,my){if(!victoryBtns||victoryTimer<3)return;
  var b1=victoryBtns.a,b2=victoryBtns.c;
  if(mx>=b1.x&&mx<=b1.x+b1.w&&my>=b1.y&&my<=b1.y+b1.h){resetGame();state='GAMEPLAY';AM.playM('gameplay');}
  if(mx>=b2.x&&mx<=b2.x+b2.w&&my>=b2.y&&my<=b2.y+b2.h){selChar=-1;state='CHARACTER_SELECT';AM.playM('title');}}

// ============================================================
// UPDATE
// ============================================================
function update(){
  snow.forEach(function(s){s.y+=s.sp;s.x+=s.dr+Math.sin(time+s.x*0.01)*0.3;if(s.y>CH){s.y=-5;s.x=Math.random()*CW;}if(s.x>CW)s.x=0;if(s.x<0)s.x=CW;});
  idleTimer+=dt;if(idleTimer>0.3){idleTimer=0;idleFrame=(idleFrame+1)%4;}
  if(freezeTimer>0){freezeTimer-=dt;return;}
  if(state==='GAMEPLAY'){updatePlayer();updateEnemies();}
  else if(state==='BOSS_INTRO'){updatePlayer();bossIntroTimer-=dt;if(bossIntroTimer<=0){initBoss();state='BOSS_FIGHT';bossHealthAnim=0;}}
  else if(state==='BOSS_FIGHT'){updatePlayer();updateEnemies();updateBoss();if(bossHealthAnim<1)bossHealthAnim+=dt*0.8;}
  else if(state==='VICTORY'){victoryTimer+=dt;}
  else if(state==='GAME_OVER'){gameOverTimer-=dt;}
  particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.isDrip){p.vy+=0.15;if(p.y>GROUND_Y)p.life=0;}else p.vy+=0.1;p.life-=dt;});
  particles=particles.filter(function(p){return p.life>0;});
  teslaChains.forEach(function(tc){tc.life-=dt;});
  teslaChains=teslaChains.filter(function(tc){return tc.life>0;});
  if(shakeT>0)shakeT-=dt;
}

// ============================================================
// RENDER
// ============================================================
function render(){
  ctx.clearRect(0,0,CW,CH);ctx.imageSmoothingEnabled=false;
  ctx.save();if(shakeT>0)ctx.translate((Math.random()-0.5)*shakeAmt*2,(Math.random()-0.5)*shakeAmt*2);
  try{
    if(state==='TITLE')renderTitle();
    else if(state==='CHARACTER_SELECT')renderCS();
    else if(state==='GAMEPLAY'||state==='BOSS_INTRO'||state==='BOSS_FIGHT')renderGP();
    else if(state==='VICTORY')renderVic();
    else if(state==='GAME_OVER')renderGO();
  }catch(e){ctx.fillStyle='#F00';ctx.font='14px monospace';ctx.fillText('Error: '+e.message,10,30);console.error(e);}
  ctx.restore();
}

function drawSL(a){a=a||1;snow.forEach(function(s){ctx.fillStyle='rgba(240,248,255,'+(s.a*a)+')';ctx.fillRect(Math.round(s.x),Math.round(s.y),s.sz,s.sz);});}

function renderGP(){
  var p=player;

  lampposts.forEach(function(lp){var lx=lp.x-camX;if(lx>-20&&lx<CW+20){px(ctx,lx,GROUND_Y-100,4,100,'#556677');px(ctx,lx-6,GROUND_Y-104,16,6,'#556677');ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#FFEEDD';ctx.beginPath();ctx.arc(lx+2,GROUND_Y-98,40,0,Math.PI*2);ctx.fill();ctx.restore();px(ctx,lx-4,GROUND_Y-98,2,8,'#AAD8F0');px(ctx,lx+6,GROUND_Y-98,2,6,'#AAD8F0');px(ctx,lx+12,GROUND_Y-98,2,10,'#AAD8F0');}});

    // Surface shimmer
    ctx.fillStyle='rgba(220,240,255,'+(0.3+Math.sin(time*2+plat.x*0.05)*0.15)+')';ctx.fillRect(platX+4,plat.y-2,plat.w-8,2);
  }});
  drawSL(0.5);
  // Enemies
  enemies.forEach(function(e){var ex=e.x-camX;if(ex<-120||ex>CW+120)return;var flash=e.hitTimer>0;
    var melt=e.melting?e.meltProgress:e.meltLevel;

      var puddleW=e.w*(e.dead?0.8:melt*0.8);var puddleAlpha=e.dead?(e.deathTimer/1.5)*0.6:melt*0.6;

    }
    if(e.dead){

    if(e.facing<0){ctx.translate(ex+e.w,0);ctx.scale(-1,1);ex=0;}
    if(e.type==='monster')drawIceMonster(ctx,ex,drawY,e.animFrame,e.maskType,flash,melt);

  });
  // Laser beam rendering
  if(laserTimer>0&&player){
    var lsx=laserStartX-camX,lsy=laserStartY,lhx=laserHitX-camX,lhy=laserHitY;
    ctx.save();
    ctx.globalAlpha=laserTimer/0.25;
    ctx.strokeStyle='#FF2200';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(lsx,lsy);ctx.lineTo(lhx,lhy);ctx.stroke();
    ctx.strokeStyle='#FF8844';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(lsx,lsy);ctx.lineTo(lhx,lhy);ctx.stroke();
    ctx.strokeStyle='#FFCC88';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(lsx,lsy);ctx.lineTo(lhx,lhy);ctx.stroke();
    // Glow
    ctx.globalAlpha=laserTimer/0.25*0.4;ctx.strokeStyle='#FF4400';ctx.lineWidth=16;ctx.beginPath();ctx.moveTo(lsx,lsy);ctx.lineTo(lhx,lhy);ctx.stroke();
    ctx.restore();
  }
  // Tesla chain arcs
  teslaChains.forEach(function(tc){
    ctx.save();ctx.globalAlpha=tc.life/0.3;
    var tx1=tc.x1-camX,ty1=tc.y1,tx2=tc.x2-camX,ty2=tc.y2;

    var segs=5;for(var si=1;si<=segs;si++){var t2=si/segs;

    for(var si=1;si<=segs;si++){var t2=si/segs;

    else if(pr.type==='freeze'){ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle='#88EEFF';ctx.fillRect(prx-25,pr.y-5,50,10);ctx.fillStyle='#BBFFFF';ctx.fillRect(prx-18,pr.y-3,36,6);ctx.restore();}});
  // Boss

    if(boss.dead){ctx.globalAlpha=Math.max(0,boss.deathTimer/3);drawBoss(ctx,bx,boss.y-BOSS_H,boss.phase,boss.animFrame,boss.hitTimer>0);ctx.globalAlpha=1;if(boss.deathTimer>1)spawnP(bx+boss.w/2,boss.y-BOSS_H/2,1,'#FFDD44',3,0.5);}

  // HUD

  // Boss HP bar

function renderHUD(){var p=player;if(!p)return;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(10,10,220,50);drawBeaglePortrait(ctx,14,14,p.char.id,42);
  var hp=p.hp/p.maxHP;ctx.fillStyle='#333';ctx.fillRect(62,14,160,16);ctx.fillStyle=hp>0.5?'#44CC44':hp>0.25?'#CCAA22':'#CC2222';ctx.fillRect(62,14,160*hp,16);ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(62,14,160,16);
  var ep=p.energy/p.maxEnergy;ctx.fillStyle='#333';ctx.fillRect(62,36,160,10);ctx.fillStyle='#4488FF';ctx.fillRect(62,36,160*ep,10);ctx.strokeRect(62,36,160,10);
  ctx.save();ctx.font=gf(10,false);ctx.fillStyle='#FFF';ctx.fillText('x'+p.lives,236,26);ctx.restore();
  ctx.save();ctx.font=gf(14,true);ctx.textAlign='center';ctx.fillStyle='#FFF';ctx.fillText('SCORE: '+score,CW/2,30);ctx.restore();}

function renderVic(){
  var beatPhase=time*4; // 2 beats/sec at 120BPM
  // Background: warm gradient
  var g=ctx.createLinearGradient(0,0,0,CH);g.addColorStop(0,'#FF6622');g.addColorStop(0.3,'#FFAA44');g.addColorStop(0.6,'#FFEEBB');g.addColorStop(1,'#FFFFDD');ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  // Light rays
  ctx.save();ctx.globalAlpha=0.15;for(var i=0;i<12;i++){ctx.fillStyle=i%2===0?'#FFF':'#FFD700';ctx.beginPath();var a=i*Math.PI/6+time*0.2;ctx.moveTo(CW/2,CH*0.5);ctx.lineTo(CW/2+Math.cos(a)*800,CH*0.5+Math.sin(a)*800);ctx.lineTo(CW/2+Math.cos(a+Math.PI/12)*800,CH*0.5+Math.sin(a+Math.PI/12)*800);ctx.fill();}ctx.restore();
  // Stage floor
  ctx.fillStyle='#5C3A1E';ctx.fillRect(0,CH-120,CW,120);
  ctx.fillStyle='#8B5E3C';ctx.fillRect(0,CH-120,CW,6);
  // Stage front edge
  ctx.fillStyle='#3A2210';ctx.fillRect(0,CH-16,CW,16);
  // Stage floor planks
  for(var i=0;i<16;i++){ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(i*82,CH-114,2,110);}

  // Band positions: Rico(guitar), Coco(guitar), Duke(drums), Patches(guitar)
  var bandPos=[
    {id:'rico',x:180,facing:1,role:'guitar',gCol:'#B22222'},
    {id:'coco',x:440,facing:1,role:'guitar',gCol:'#2266CC'},
    {id:'duke',x:580,facing:1,role:'drums'},
    {id:'patches',x:900,facing:-1,role:'guitar',gCol:'#9933CC'}
  ];
  var stageY=CH-140; // feet position on stage
  var sc=2.5; // beagle scale
  var bw=48*sc,bh=68*sc; // beagle sprite dimensions at scale

  // Draw drum kit behind Duke first
  drawDrumKit(ctx,bandPos[2].x-30,stageY-50,1.8);

  // Draw each beagle with instrument
  for(var bi=0;bi<bandPos.length;bi++){
    var bp=bandPos[bi];
    var bob=Math.sin(beatPhase*Math.PI+bi)*2;
    var strumOff=bp.role==='guitar'?Math.sin(beatPhase*Math.PI)*3:0;
    var bx=bp.x-bw/2;
    var by=stageY-bh+bob;

    // Spotlight for selected character
    var isSelected=selChar>=0&&CHARS[selChar].id===bp.id;
    if(isSelected){
      ctx.save();ctx.globalAlpha=0.15+Math.sin(time*3)*0.05;
      var sg=ctx.createRadialGradient(bp.x,stageY-bh/2,10,bp.x,stageY-bh/2,bh);
      sg.addColorStop(0,'#FFFF88');sg.addColorStop(1,'rgba(255,255,136,0)');
      ctx.fillStyle=sg;ctx.fillRect(bp.x-bh,stageY-bh-20,bh*2,bh+40);
      // Spotlight cone from above
      ctx.fillStyle='rgba(255,255,200,0.08)';ctx.beginPath();ctx.moveTo(bp.x-20,0);ctx.lineTo(bp.x+20,0);ctx.lineTo(bp.x+bh*0.6,stageY+20);ctx.lineTo(bp.x-bh*0.6,stageY+20);ctx.fill();
      ctx.restore();
    }

    // Draw beagle
    drawBeagle(ctx,bx,by,bp.id,idleFrame,sc,bp.facing,'walk');

    // Draw instrument overlay
    if(bp.role==='guitar'){
      var gx=bp.facing===1?bx+bw*0.55:bx+bw*0.05;
      var gy=by+bh*0.3+strumOff;
      ctx.save();
      if(bp.facing===-1){ctx.translate(gx+20,gy);ctx.scale(-1,1);ctx.translate(-gx-20,-gy);}
      drawGuitar(ctx,gx,gy,sc*0.7,bp.gCol);
      ctx.restore();
    }

    // Animated drum sticks for Duke
    if(bp.role==='drums'){
      drawDrumSticks(ctx,bp.x-45,stageY-bh*0.55,1.8,idleFrame);
    }
  }

  // Title text — moved higher
  if(victoryTimer>0.5){ctx.save();ctx.font=gf(36,true);ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#FF4400';ctx.shadowBlur=30+Math.sin(time*5)*10;
    var tg=ctx.createLinearGradient(CW/2-300,CH*0.1,CW/2+300,CH*0.1);tg.addColorStop(0,'#FF2200');tg.addColorStop(0.3,'#FF8800');tg.addColorStop(0.5,'#FFDD00');tg.addColorStop(0.7,'#FF8800');tg.addColorStop(1,'#FF2200');ctx.fillStyle=tg;
    ctx.fillText("YOU'RE FIRE",CW/2,CH*0.12);ctx.fillText("PATROL!!!",CW/2,CH*0.12+50);ctx.shadowBlur=0;ctx.strokeStyle='#CC2200';ctx.lineWidth=2;ctx.strokeText("YOU'RE FIRE",CW/2,CH*0.12);ctx.strokeText("PATROL!!!",CW/2,CH*0.12+50);ctx.restore();
    if(Math.random()<0.3)particles.push({x:CW/2+(Math.random()-0.5)*400,y:CH*0.12+20,vx:(Math.random()-0.5)*2,vy:-2-Math.random()*3,life:0.8,maxLife:0.8,color:Math.random()>0.5?'#FF4400':'#FFAA00',size:3+Math.random()*4});}
  // Particles
  particles.forEach(function(pt){if(!pt.isText){var al=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.globalAlpha=al;ctx.fillRect(pt.x,pt.y,pt.size,pt.size);ctx.globalAlpha=1;}});
  // Score
  if(victoryTimer>1.5){ctx.save();ctx.font=gf(16,true);ctx.textAlign='center';ctx.fillStyle='#442200';ctx.fillText('FINAL SCORE: '+score,CW/2,CH*0.28);ctx.restore();}
  // Confetti
  if(victoryTimer>1){for(var i=0;i<3;i++){var cx2=Math.random()*CW,cy=Math.random()*CH*0.6;ctx.fillStyle=['#FF4444','#44FF44','#4444FF','#FFFF44','#FF44FF','#44FFFF'][Math.floor(Math.random()*6)];ctx.fillRect(cx2,cy,4+Math.random()*4,4+Math.random()*4);}}
  // Buttons at bottom
  victoryBtns=null;if(victoryTimer>3){var b1={x:CW/2-250,y:CH-50,w:220,h:40},b2={x:CW/2+30,y:CH-50,w:220,h:40};
    ctx.fillStyle='#22AA44';ctx.fillRect(b1.x,b1.y,b1.w,b1.h);ctx.strokeStyle='#44FF88';ctx.lineWidth=2;ctx.strokeRect(b1.x,b1.y,b1.w,b1.h);ctx.save();ctx.font=gf(11,true);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#FFF';ctx.fillText('PLAY AGAIN',b1.x+b1.w/2,b1.y+b1.h/2);ctx.restore();
    ctx.fillStyle='#2266AA';ctx.fillRect(b2.x,b2.y,b2.w,b2.h);ctx.strokeStyle='#44AAFF';ctx.lineWidth=2;ctx.strokeRect(b2.x,b2.y,b2.w,b2.h);ctx.save();ctx.font=gf(9,true);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#FFF';ctx.fillText('CHANGE CHARACTER',b2.x+b2.w/2,b2.y+b2.h/2);ctx.restore();
    victoryBtns={a:b1,c:b2};}
}
function renderGO(){ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,CW,CH);ctx.save();ctx.font=gf(36,true);ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#CC2222';ctx.shadowColor='#FF0000';ctx.shadowBlur=20;ctx.fillText('GAME OVER',CW/2,CH/2-30);ctx.restore();
  ctx.save();ctx.font=gf(14,true);ctx.textAlign='center';ctx.fillStyle='#FFF';ctx.fillText('SCORE: '+score,CW/2,CH/2+30);ctx.restore();
  if(gameOverTimer<=0){ctx.save();ctx.font=gf(12,false);ctx.textAlign='center';ctx.fillStyle='rgba(200,230,255,'+(0.5+Math.sin(time*3)*0.5)+')';ctx.fillText('CLICK TO TRY AGAIN',CW/2,CH/2+80);ctx.restore();}}

// ============================================================
// MAIN LOOP + BOOT
// ============================================================
function loop(ts){dt=(ts-lastTime)/1000;lastTime=ts;time+=dt;if(dt>0.1)dt=0.1;update();render();requestAnimationFrame(loop);}
function resize(){var a=CW/CH,w=window.innerWidth,h=window.innerHeight;if(w/h>a)w=h*a;else h=w/a;canvas.style.width=w+'px';canvas.style.height=h+'px';}
window.addEventListener('DOMContentLoaded',function(){ctx=canvas.getContext('2d');canvas.width=CW;canvas.height=CH;window.addEventListener('resize',resize);resize();lastTime=performance.now();requestAnimationFrame(loop);});
</script>
